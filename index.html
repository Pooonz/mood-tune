/* =========================================================
   ロジック
   ========================================================= */
function matchPercent(u,a){let h=0;for(let i=0;i<4;i++)if(u[i]===a[i])h++;return Math.round(55+h*11.25);}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
// アーティストの4軸コードから紹介キーワードを自動生成（翻訳不要で無限に拡張可能）
function codeDesc(code,name){
  const kw=L().kw, ax=['A','B','C','D'];
  return ax.map((a,i)=>{const arr=kw[a][code[i]]; return arr[hashStr(name+i)%arr.length];}).join(' · ');
}
function artistMatches(userCode, genreKey){
  return ARTISTS.filter(a=>!genreKey||a.g===genreKey)
    .map(a=>({...a, pct:matchPercent(userCode,a.code)}))
    .sort((x,y)=>y.pct-x.pct||x.name.localeCompare(y.name)).slice(0,10);
}
function bucketsByProximity(base){
  const d=b=>(base[0]!==b[0]?1:0)+(base[1]!==b[1]?1:0);
  return ["AH","AE","CH","CE"].sort((x,y)=>d(x)-d(y));
}
// タイプ相性: 全軸反転（正反対）と、気分は同じで音の世界が逆（気の合う相棒）
const AXIS_FLIP={A:'C',C:'A',H:'E',E:'H',N:'D',D:'N',O:'X',X:'O'};
function invCode(code){ return code.split('').map(c=>AXIS_FLIP[c]).join(''); }
function bestMatchCode(code){ return code.slice(0,2)+AXIS_FLIP[code[2]]+AXIS_FLIP[code[3]]; }

// 言語切替
function buildLangSel(){
  document.getElementById('langsel').innerHTML = LANGS.map(([k,label])=>
    `<button data-l="${k}" onclick="setLang('${k}')">${label}</button>`).join('');
}
function setLang(k){
  lang=k; document.documentElement.lang=k;
  document.querySelectorAll('#langsel button').forEach(b=>b.classList.toggle('on',b.dataset.l===k));
  applyChrome();
  if(screen==='quiz') render();
  else if(screen==='result' && lastScore) showResult(currentCode,lastScore,lastCount);
}
function applyChrome(){
  const u=L().ui;
  document.getElementById('brandSub').textContent=u.brandSub;
  document.getElementById('startEyebrow').textContent=u.startEyebrow;
  document.getElementById('startTitle').innerHTML=u.startTitle;

  document.getElementById('metaType').textContent=u.metaType;

  document.getElementById('footer').textContent=u.footer;
}

function show(id){
  ['start','quiz','result'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  const el=document.getElementById(id);
  el.classList.remove('hidden','fade'); void el.offsetWidth; el.classList.add('fade');
}

function start(){ answers=[]; idx=0; screen='quiz'; show('quiz'); render(); }

function render(){
  const D=QDEF[idx], q=L().q[idx];
  document.getElementById('tline').style.width=(idx/QDEF.length*100)+'%';
  document.getElementById('qnow').textContent=pad(idx+1);
  document.getElementById('qaxis').textContent=AX_NAME[D.axis];
  document.getElementById('qnum').textContent='Q'+pad(idx+1);
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('backBtn').style.visibility= idx===0?'hidden':'visible';
  const opts=document.getElementById('opts'); opts.innerHTML='';
  [['A',D.a,q.a],['B',D.b,q.b]].forEach(([mark,v,text])=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="mark">${mark}</span><span>${text}</span>`;
    b.onclick=()=>choose(D.axis,v);
    opts.appendChild(b);
  });
  document.getElementById('keyhint').innerHTML=L().ui.keyhint;
  const box=document.querySelector('.question'); box.classList.remove('fade'); void box.offsetWidth; box.classList.add('fade');
}

function choose(axis,v){ answers[idx]={axis,v}; idx++; if(idx>=QDEF.length) finish(); else render(); }
function back(){ if(idx>0){ idx--; render(); } }

document.addEventListener('keydown',e=>{
  if(screen!=='quiz') return;
  const k=e.key.toLowerCase();
  if(k==='a'||k==='b'){
    const D=QDEF[idx];
    choose(D.axis, k==='a'?D.a:D.b);
  } else if(e.key==='ArrowLeft'||e.key==='Backspace'){
    e.preventDefault(); back();
  }
});

function finish(){
  const score={A:0,B:0,C:0,D:0}, count={A:0,B:0,C:0,D:0};
  const left={A:'A',B:'H',C:'N',D:'O'};
  answers.forEach(a=>{ count[a.axis]++; if(a.v===left[a.axis]) score[a.axis]++; });
  const code=(score.A>=count.A/2?'A':'C')+(score.B>=count.B/2?'H':'E')+
             (score.C>=count.C/2?'N':'D')+(score.D>=count.D/2?'O':'X');
  lastScore=score; lastCount=count;
  showResult(code,score,count);
}

function showResult(code,score,count){
  screen='result'; currentCode=code; currentBucket=code.slice(0,2);
  currentGenre="west"; currentArtistGenre="";
  const u=L(), T=u.types[code], P=u.personas[code];

  const axisRows=['A','B','C','D'].map(ax=>{
    const info=u.axis[ax]; const lp=score[ax]/count[ax]; const strong=lp>=0.5;
    const dot=Math.round((1-lp)*100); // 左寄りの回答が多いほど左極へ
    return `<div class="axis"><div class="labels">
      <span class="${strong?'on':'off'}">${info.left}</span>
      <span class="${strong?'off':'on'}">${info.right}</span></div>
      <div class="meter"><i style="left:${dot}%"></i></div></div>`;
  }).join('');

  const aTabs=`<button class="gtab" data-ag="" onclick="selectArtistGenre('')">${u.ui.allGenres}</button>`+
    GENRE_KEYS.map(g=>`<button class="gtab" data-ag="${g}" onclick="selectArtistGenre('${g}')">${u.genres[g]}</button>`).join('');
  const gTabs=GENRE_KEYS.map(g=>`<button class="gtab" data-g="${g}" onclick="selectGenre('${g}')">${u.genres[g]}</button>`).join('');

  document.getElementById('result').innerHTML=`
    <div class="res-head">
      <div class="eyebrow">${u.ui.secType}</div>
      <div class="stamps">${code.split('').map(c=>`<span>${c}</span>`).join('')}</div>
      <h1 class="res-name serif">${T.name}</h1>
      <div class="res-tag">${T.tag}</div>
    </div>
    <p class="res-desc">${T.desc}</p>

    <div class="section-label">${u.ui.secPersona}</div>
    <div class="persona">
      <p class="persona-text">${P.p}</p>
      <div class="ptraits">${P.t.map(t=>`<span>#${t}</span>`).join('')}</div>
    </div>

    <div class="section-label">${u.ui.secMood}</div>
    <div class="axes">${axisRows}</div>

    <div class="section-label">${u.ui.secChem}</div>
    <div class="chem-grid">
      <div class="chem-card">
        <div class="chem-role">${u.ui.chemBest}</div>
        <div class="chem-code">${bestMatchCode(code).split('').join('·')}</div>
        <div class="chem-name serif">${u.types[bestMatchCode(code)].name}</div>
        <p>${u.ui.chemBestDesc}</p>
      </div>
      <div class="chem-card opp">
        <div class="chem-role">${u.ui.chemOpp}</div>
        <div class="chem-code">${invCode(code).split('').join('·')}</div>
        <div class="chem-name serif">${u.types[invCode(code)].name}</div>
        <p>${u.ui.chemOppDesc}</p>
      </div>
    </div>

    <div class="section-label">${u.ui.secArtist}</div>
    <div class="gtabs" id="artistTabs">${aTabs}</div>
    <div class="amatch" id="artistList" style="margin-top:18px;"></div>

    <div class="section-label">${u.ui.secGenre}</div>
    <div class="gtabs" id="genreTabs">${gTabs}</div>

    <div class="section-label" style="margin-top:30px;">${u.ui.secPlaylist}
      <span id="plBucket" style="color:var(--sub); text-transform:none; letter-spacing:.02em; font-weight:400; margin-left:8px;"></span>
    </div>
    <div class="tracks" id="trackList"></div>

    <div class="res-actions">
      <a class="btn" id="spotifyBtn" href="#" target="_blank" rel="noopener">${u.ui.btnSpotify}</a>
      <button class="btn ghost" onclick="downloadCard()">${u.ui.btnCard}</button>
      <button class="btn ghost" onclick="start()">${u.ui.btnRetry}</button>
      <button class="copy" onclick="copyResult()">${u.ui.copy}</button>
    </div>`;
  document.getElementById('tline').style.width='100%';
  show('result');
  selectArtistGenre("");
  selectGenre("west");
}

function selectArtistGenre(g){
  currentArtistGenre=g; const u=L();
  document.querySelectorAll('#artistTabs .gtab').forEach(b=>b.classList.toggle('on',b.dataset.ag===g));
  const list=artistMatches(currentCode, g||null);
  const box=document.getElementById('artistList');
  if(!list.length){ box.innerHTML=`<p style="color:var(--sub);font-size:13px;padding:12px 0;">${u.ui.noArtist}</p>`; return; }
  box.innerHTML=list.map((a,i)=>`
    <div class="arow" style="--i:${i}"><span class="arank">${pad(i+1)}</span>
      <div class="ainfo">
        <div class="atop"><b>${a.name}</b><span class="apct">${a.pct}%</span></div>
        <div class="ameter"><i style="width:${a.pct}%"></i></div>
        <div class="anote">${u.genres[a.g]} ・ ${codeDesc(a.code,a.name)}</div>
      </div></div>`).join('');
}

function selectGenre(key){
  currentGenre=key; const u=L();
  document.querySelectorAll('#genreTabs .gtab').forEach(b=>b.classList.toggle('on',b.dataset.g===key));
  const pools=GENRE_POOLS[key]||{};
  const exact=pools[currentBucket]||[];
  // 近い気分から4曲ずつ拾って12曲（計24曲表示、プールは48曲）
  const rest=bucketsByProximity(currentBucket).filter(b=>b!==currentBucket)
    .flatMap(b=>(pools[b]||[]).slice(0,4));
  let n=0;
  const row=t=>{n++;return `<div class="trow" style="--i:${n}"><span class="tn">${pad(n)}</span>
      <span class="tt">${t[1]}</span><span class="ta">${t[0]}</span></div>`;};
  document.getElementById('trackList').innerHTML=
    `<div class="pl-group">${u.ui.plExact}</div>`+exact.map(row).join('')+
    `<div class="pl-group">${u.ui.plExpand}</div>`+rest.map(row).join('');
  document.getElementById('plBucket').textContent=u.ui.plCenter(u.genres[key], u.buckets[currentBucket], exact.length+rest.length);
  const sq=encodeURIComponent(`${u.genres[key]} ${u.buckets[currentBucket]}`);
  document.getElementById('spotifyBtn').href=`https://open.spotify.com/search/${sq}`;
}

/* ===== 結果カード画像の生成（canvas） ===== */
function cardWrap(x,text,tx,ty,maxW,lh){
  const hasSpace=text.includes(' ');
  const toks=hasSpace?text.split(' '):text.split('');
  const glue=hasSpace?' ':'';
  let line='', y=ty;
  for(const t of toks){
    const test=line?line+glue+t:t;
    if(x.measureText(test).width>maxW && line){ x.fillText(line,tx,y); line=t; y+=lh; }
    else line=test;
  }
  if(line){ x.fillText(line,tx,y); y+=lh; }
  return y;
}
const CARD_SERIF='"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",Georgia,serif';
const CARD_SANS='"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif';

function buildCard(){
  const u=L(), T=u.types[currentCode], P=u.personas[currentCode];
  const W=1080, H=1350, M=80;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const x=cv.getContext('2d');

  // 紙の背景
  x.fillStyle='#f4f0e8'; x.fillRect(0,0,W,H);
  x.strokeStyle='#ddd6c8'; x.lineWidth=2; x.strokeRect(28,28,W-56,H-56);

  // マストヘッド
  x.fillStyle='#1f1d1a';
  x.font='600 62px '+CARD_SERIF;
  x.fillText('Mood Tune', M, 138);
  x.font='24px '+CARD_SANS; x.fillStyle='#6f6a60'; x.textAlign='right';
  x.fillText(u.ui.startEyebrow, W-M, 132); x.textAlign='left';
  // 二重罫線
  x.fillStyle='#1f1d1a'; x.fillRect(M,170,W-M*2,6); x.fillRect(M,184,W-M*2,2);

  // タイプ見出し
  x.fillStyle='#b5432e'; x.font='600 26px '+CARD_SANS;
  x.fillText(u.ui.secType.toUpperCase(), M, 262);

  // スタンプ
  currentCode.split('').forEach((c,i)=>{
    const sx=M+i*116+48, sy=352;
    x.save(); x.translate(sx,sy); x.rotate(((i%2?1:-1)*1.4)*Math.PI/180);
    x.strokeStyle='#b5432e'; x.lineWidth=4; x.strokeRect(-48,-48,96,96);
    x.fillStyle='#b5432e'; x.font='700 54px Georgia,serif';
    x.textAlign='center'; x.textBaseline='middle'; x.fillText(c,0,4);
    x.restore();
  });
  x.textAlign='left'; x.textBaseline='alphabetic';

  // タイプ名（収まるまで縮小）
  let fs=76;
  x.font='600 '+fs+'px '+CARD_SERIF;
  while(x.measureText(T.name).width>W-M*2 && fs>40){ fs-=4; x.font='600 '+fs+'px '+CARD_SERIF; }
  x.fillStyle='#1f1d1a'; x.fillText(T.name, M, 530);
  x.fillStyle='#6f6a60'; x.font='30px '+CARD_SANS; x.fillText(T.tag, M, 584);
  x.fillStyle='#ddd6c8'; x.fillRect(M,624,W-M*2,2);

  // 説明文
  x.fillStyle='#1f1d1a'; x.font='31px '+CARD_SANS;
  let y=cardWrap(x, T.desc, M, 690, W-M*2, 52);

  // 性格タグ
  x.fillStyle='#b5432e'; x.font='600 28px '+CARD_SANS;
  x.fillText(P.t.map(t=>'#'+t).join('　'), M, y+18);
  y+=70;

  // Mood Balance
  x.fillStyle='#b5432e'; x.font='600 24px '+CARD_SANS;
  x.fillText(u.ui.secMood.toUpperCase(), M, y+30);
  x.fillStyle='#ddd6c8'; x.fillRect(M,y+46,W-M*2,2);
  y+=110;
  ['A','B','C','D'].forEach(ax=>{
    const info=u.axis[ax];
    const lp=lastScore?lastScore[ax]/lastCount[ax]:0.5;
    const strong=lp>=0.5;
    x.font=(strong?'600 ':'')+'28px '+CARD_SANS;
    x.fillStyle=strong?'#1f1d1a':'#6f6a60'; x.fillText(info.left, M, y);
    x.font=(!strong?'600 ':'')+'28px '+CARD_SANS;
    x.fillStyle=!strong?'#1f1d1a':'#6f6a60'; x.textAlign='right'; x.fillText(info.right, W-M, y); x.textAlign='left';
    x.fillStyle='#ddd6c8'; x.fillRect(M, y+18, W-M*2, 4);
    x.fillStyle='#b5432e';
    x.beginPath(); x.arc(M+(W-M*2)*(1-lp), y+20, 9, 0, Math.PI*2); x.fill();
    y+=86;
  });

  // フッター
  x.fillStyle='#6f6a60'; x.font='22px '+CARD_SANS; x.textAlign='center';
  x.fillText(u.ui.footer, W/2, H-72); x.textAlign='left';
  return cv;
}

function downloadCard(){
  const cv=buildCard();
  const a=document.createElement('a');
  a.download='moodtune_'+currentCode+'_'+lang+'.png';
  a.href=cv.toDataURL('image/png');
  a.click();
}

function copyResult(){
  const u=L(), name=u.types[currentCode].name;
  const text=u.ui.share(name,currentCode);
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(()=>alert(u.ui.copied+"\n\n"+text)).catch(()=>alert(text)); }
  else alert(text);
}
